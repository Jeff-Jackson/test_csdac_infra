resources:
  requests:
    cpu: 500m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.2.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

dnsPolicy: ClusterFirst
tolerations: []
nodeSelector: {}
schedules:
  defaultdaily:
    schedule: 0 5 * * *
    template:
      snapshotVolumes: false
      ttl: 336h
